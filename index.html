<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SGE — Relatório de Turno</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <!-- CSS Modules -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/topbar.css" />
    <link rel="stylesheet" href="css/filterbar.css" />
    <link rel="stylesheet" href="css/search.css" />
    <link rel="stylesheet" href="css/history.css" />
    <link rel="stylesheet" href="css/settings.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/drawer.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <link rel="stylesheet" href="css/toast.css" />

    <style>
        /* Estilos específicos para o Relatório de Turno */
        .relatorio-container {
            padding: 24px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .equipamento-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .equipamento-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .equipamento-card-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-1);
        }

        .remove-btn {
            color: var(--status-red);
            background: rgba(220, 53, 69, 0.1);
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
        }

        .remove-btn:hover {
            background: rgba(220, 53, 69, 0.2);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-2);
            text-transform: uppercase;
        }

        .input-group input,
        .input-group select,
        .input-group textarea {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            border-color: var(--primary);
        }

        .trocas-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px dashed var(--border);
        }

        .troca-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .troca-header h4 {
            font-size: 13px;
            font-weight: 600;
            color: var(--status-orange);
        }

        .add-troca-btn {
            background: rgba(253, 126, 20, 0.1);
            color: var(--status-orange);
            border: none;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .troca-item {
            background: #fff8f1;
            border: 1px solid #ffe8cc;
            padding: 12px;
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 12px;
            align-items: start;
        }

        .autocomplete-wrapper {
            position: relative;
        }

        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border);
            border-radius: 0 0 var(--radius-md) var(--radius-md);
            max-height: 200px;
            overflow-y: auto;
            z-index: 50;
            box-shadow: var(--shadow-md);
        }

        .autocomplete-item {
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--bg-body);
            font-size: 14px;
        }

        .autocomplete-item:hover,
        .autocomplete-item.selected {
            background-color: var(--bg-table-hover);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }

        .empty-state h2 {
            margin: 16px 0 8px;
            color: var(--text-1);
        }

        .empty-state p {
            color: var(--text-2);
            margin-bottom: 24px;
        }

        .primary-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .primary-btn:hover {
            opacity: 0.9;
        }

        .secondary-btn {
            background: var(--bg-body);
            color: var(--text-1);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            border-top: 1px solid var(--border);
            padding-top: 24px;
            margin-bottom: 40px;
        }

        .add-equip-btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 2px dashed var(--border);
            border-radius: var(--radius-lg);
            color: var(--text-2);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-equip-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--bg-table-hover);
        }
    </style>
</head>

<body>
    <!-- ==================== LOGIN SCREEN ==================== -->
    <div id="login-screen">
        <div class="login-box">
            <img src="img/logo.png" alt="Grupo GPS" class="login-logo" onerror="this.style.display='none';" />
            <h2 class="login-title">Relatório de Turno</h2>
            <form id="login-form">
                <div class="login-input-group">
                    <label>Usuário</label>
                    <input type="text" id="login-user" required autocomplete="username" />
                </div>
                <div class="login-input-group">
                    <label>Senha</label>
                    <input type="password" id="login-pass" required autocomplete="current-password" />
                </div>
                <button type="submit" class="login-btn" id="login-submit">Entrar</button>
            </form>
            <div class="login-error" id="login-error"></div>
        </div>
        <div class="login-footer">
            Desenvolvido por Warlison Abreu
        </div>
    </div>

    <div id="app">

        <!-- ==================== LOADING SCREEN ==================== -->
        <div id="loading-screen" style="background:#f4f7fa; color:#0f3868">
            <div class="loading-content">
                <div style="margin-bottom:24px;">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#0f3868" stroke-width="2"
                        class="loading-spinner">
                        <path
                            d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83">
                        </path>
                    </svg>
                </div>
                <h1 style="color:#0f3868; font-weight:800; letter-spacing:1px; margin-bottom:8px">SGE</h1>
                <div class="loading-subtitle" style="color:#555; font-weight:500;">RELATÓRIO DE TURNO</div>
                <div class="loading-bar-container" style="background:rgba(15, 56, 104, 0.1)">
                    <div class="loading-bar" style="background:#0f3868"></div>
                </div>
                <div id="loading-status" style="color:#666; font-size:13px; font-weight:500">Inicializando...</div>
            </div>
        </div>

        <style>
            .loading-spinner {
                animation: spin 2s linear infinite;
                opacity: 0.8;
            }

            @keyframes spin {
                100% {
                    transform: rotate(360deg);
                }
            }

            #loading-screen {
                z-index: 9999;
            }
        </style>

        <!-- ==================== TOPBAR ==================== -->
        <div id="topbar">
            <div class="logo">
                SGE <span>Relatório de Turno</span>
            </div>

            <!-- Hamburger Button (Mobile Only) -->
            <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Abrir Menu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>

            <div id="nav" class="nav-modules">
                <div class="nav-module active">
                    <button class="module-title" data-view="novo">
                        Novo Relatório
                    </button>
                </div>

                <div class="nav-module">
                    <button class="module-title" data-view="historico">
                        Histórico
                    </button>
                </div>

                <div class="nav-module" id="nav-dashboard" style="display:none;">
                    <button class="module-title" data-view="dashboard">
                        Dashboard
                    </button>
                </div>
            </div>

            <div id="topbar-right">
                <div id="topbar-user" style="display:flex; align-items:center; padding-right:12px; margin-right:4px;">
                </div>
                <button id="logout-btn" class="secondary-btn" style="padding: 6px 12px; font-size:12px;">Sair</button>
            </div>
        </div>

        <!-- ==================== MAIN CONTENT ==================== -->
        <div id="main" style="top: 55px; height: calc(100vh - 55px); overflow-y: auto;">

            <!-- NOVO RELATORIO VIEW -->
            <div id="novo-view" class="view active">
                <div class="relatorio-container" id="relatorio-content">
                    <!-- Content built by relatorio.js -->
                </div>
            </div>

            <!-- HISTÓRICO VIEW -->
            <div id="historico-view" class="view">
                <div class="relatorio-container">
                    <h2 style="margin-bottom: 24px; color: var(--text-1); font-size: 24px;">Histórico (Hoje)</h2>
                    <div id="historico-content"></div>
                </div>
            </div>

            <!-- DASHBOARD VIEW -->
            <div id="dashboard-view" class="view">
                <div class="relatorio-container" id="dashboard-content"></div>
            </div>

        </div>

        <!-- ==================== TOAST ==================== -->
        <div id="toast-container"></div>
    </div>

    <!-- JS Modules -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/relatorio.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
