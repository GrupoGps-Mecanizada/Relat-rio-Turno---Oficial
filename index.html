<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SGE — Relatório de Turno</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <!-- CSS Modules -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/topbar.css" />
    <link rel="stylesheet" href="css/filterbar.css" />
    <link rel="stylesheet" href="css/search.css" />
    <link rel="stylesheet" href="css/history.css" />
    <link rel="stylesheet" href="css/settings.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/drawer.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <link rel="stylesheet" href="css/toast.css" />
    <link rel="stylesheet" href="css/relatorio.css" />
</head>

<body>
    <!-- ==================== LOGIN SCREEN ==================== -->
    <div id="login-screen">
        <div class="login-box">
            <img src="img/logo.png" alt="Grupo GPS" class="login-logo" onerror="this.style.display='none';" />
            <h2 class="login-title">Relatório de Turno</h2>
            <form id="login-form">
                <div class="login-input-group">
                    <label>Usuário</label>
                    <input type="text" id="login-user" required autocomplete="username" />
                </div>
                <div class="login-input-group">
                    <label>Senha</label>
                    <input type="password" id="login-pass" required autocomplete="current-password" />
                </div>
                <button type="submit" class="login-btn" id="login-submit">Entrar</button>
            </form>
            <div class="login-error" id="login-error"></div>
        </div>
        <div class="login-footer">
            Desenvolvido por Warlison Abreu
        </div>
    </div>

    <div id="app">

        <!-- ==================== LOADING SCREEN ==================== -->
        <div id="loading-screen">
            <div class="loading-content">
                <div class="loading-logo-ring">
                    <!-- Outer animated ring -->
                    <svg class="loading-ring" viewBox="0 0 80 80">
                        <defs>
                            <linearGradient id="ring-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#4a7fd7" />
                                <stop offset="50%" stop-color="#6ba3f2" />
                                <stop offset="100%" stop-color="#3a6abf" />
                            </linearGradient>
                        </defs>
                        <circle cx="40" cy="40" r="36" />
                    </svg>
                    <!-- Inner logo SVG -->
                    <svg class="loading-logo" viewBox="0 0 24 24" fill="none" stroke="#4a7fd7" stroke-width="2"
                        width="32" height="32">
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                        <polyline points="14 2 14 8 20 8" />
                        <path d="M16 13H8" />
                        <path d="M16 17H8" />
                        <path d="M10 9H8" />
                    </svg>
                </div>
                <div style="text-align: center;">
                    <h1 class="loading-title">SGE</h1>
                    <div class="loading-subtitle">RELATÓRIO DE TURNO</div>
                </div>
                <div class="loading-progress">
                    <div class="loading-bar">
                        <div class="loading-bar-fill"></div>
                    </div>
                    <div id="loading-status" class="loading-status">Inicializando</div>
                </div>
            </div>
        </div>

        <!-- ==================== TOPBAR ==================== -->
        <div id="topbar">
            <div class="logo">
                SGE <span>Relatório de Turno</span>
            </div>

            <!-- Hamburger Button (Mobile Only) -->
            <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Abrir Menu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>

            <div id="nav" class="nav-modules">
                <div class="nav-module active">
                    <button class="module-title" data-view="novo">
                        Novo Relatório
                    </button>
                </div>

                <div class="nav-module">
                    <button class="module-title" data-view="historico">
                        Histórico
                    </button>
                </div>

                <div class="nav-module" id="nav-dashboard" style="display:none;">
                    <button class="module-title" data-view="dashboard">
                        Dashboard
                    </button>
                </div>
            </div>

            <div id="topbar-right">
                <div id="topbar-user" style="display:flex; align-items:center; padding-right:12px; margin-right:4px;">
                </div>
                <button id="logout-btn" class="secondary-btn" style="padding: 6px 12px; font-size:12px;">Sair</button>
            </div>
        </div>

        <!-- ==================== MAIN CONTENT ==================== -->
        <div id="main" style="top: 55px; height: calc(100vh - 55px); overflow-y: auto;">

            <!-- NOVO RELATORIO VIEW -->
            <div id="novo-view" class="view active">
                <div class="relatorio-container" id="relatorio-content">
                    <!-- Content built by relatorio.js -->
                </div>
            </div>

            <!-- HISTÓRICO VIEW -->
            <div id="historico-view" class="view">
                <div class="relatorio-container">
                    <h2 style="margin-bottom: 24px; color: var(--text-1); font-size: 24px;">Histórico (Hoje)</h2>
                    <div id="historico-content"></div>
                </div>
            </div>

            <!-- DASHBOARD VIEW -->
            <div id="dashboard-view" class="view">
                <div class="relatorio-container" id="dashboard-content"></div>
            </div>

        </div>

        <!-- ==================== TOAST ==================== -->
        <div id="toast-container"></div>
    </div>

    <!-- JS Modules -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/relatorio.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
