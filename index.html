<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- Content Security Policy — restringe fontes de scripts, estilos e conexões -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self' https:;
      script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://grupogps-mecanizada.github.io;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob:;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://grupogps-mecanizada.github.io https://cdn.jsdelivr.net;
      object-src 'none';
      base-uri 'self';
    " />
    <title>RELATÓRIO DE TURNO - GPS - MECANIZADA</title>
    <meta name="theme-color" content="#0f3868" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <!-- CSS Modules — mesma base do SGE Efetivo -->
    <link rel="stylesheet" href="css/variables.css?v=1.1.0" />
    <link rel="stylesheet" href="css/base.css?v=1.1.0" />
    <link rel="stylesheet" href="css/auth.css?v=1.1.0" />
    <link rel="stylesheet" href="css/topbar.css?v=1.1.0" />
    <link rel="stylesheet" href="css/filterbar.css?v=1.1.0" />
    <link rel="stylesheet" href="css/history.css?v=1.1.0" />
    <link rel="stylesheet" href="css/dashboard.css?v=1.1.0" />
    <link rel="stylesheet" href="css/drawer.css?v=1.1.0" />
    <link rel="stylesheet" href="css/modal.css?v=1.1.0" />
    <link rel="stylesheet" href="css/toast.css?v=1.1.0" />
    <link rel="stylesheet" href="css/hub.css?v=1.1.0" />
    <link rel="stylesheet" href="css/relatorio.css?v=1.1.0" />
    <link rel="stylesheet" href="css/dark-mode.css?v=1.1.0" />
    <link rel="stylesheet" href="css/print.css?v=1.1.0" media="print" />
</head>

<body>

    <!-- ==================== LOGIN SCREEN (SSO redirect) ==================== -->
    <div id="login-screen" class="hidden">
        <canvas id="bg-canvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.25;"></canvas>
        <div class="login-glow-a"></div>
        <div class="login-glow-b"></div>

        <div class="login-box">
            <!-- Header — idêntico ao hub-header -->
            <div class="login-header">
                <div class="login-header-title">
                    <span class="login-brand-label">Central GPS · Grupo GPS</span>
                    <span class="login-brand-name">Mecanizada</span>
                </div>
                <div class="login-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                </div>
            </div>
            <!-- Linha do sistema — idêntica ao hub-sector-header -->
            <div class="login-system-row">
                <div class="login-system-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="5" y="2" width="14" height="20" rx="2"></rect>
                        <path d="M9 7h6M9 11h6M9 15h4"></path>
                    </svg>
                </div>
                <span class="login-system-name">Relatório de Turno</span>
            </div>
            <!-- Área de carregamento SSO -->
            <div class="login-loading-area">
                <div class="loading-spinner"></div>
                <span>Redirecionando para autenticação...</span>
            </div>
        </div>

        <div class="login-footer">Desenvolvido por Warlison Abreu &amp; Icaro Bernardo — Grupo GPS</div>
    </div>

    <!-- ==================== APP ==================== -->
    <div id="app">

        <!-- ==================== LOADING SCREEN ==================== -->
        <div id="loading-screen" style="background:#f4f7fa">
            <div class="loading-content" style="max-width:280px;">
                <div class="loading-bar-container"
                    style="background:rgba(15,56,104,0.08);border-radius:6px;overflow:hidden;height:3px;">
                    <div class="loading-bar"
                        style="background:linear-gradient(90deg,#0f3868,#2563eb);border-radius:6px;height:100%;"></div>
                </div>
                <div id="loading-status"
                    style="color:#94a3b8;font-size:12px;font-weight:500;margin-top:14px;text-align:center;letter-spacing:0.02em;">
                    Conectando<span class="loading-dots"></span></div>
            </div>
        </div>

        <!-- ==================== SYNC BAR ==================== -->
        <div id="global-sync-bar"></div>

        <!-- ==================== TOPBAR ==================== -->
        <div id="topbar">

            <!-- LEFT: Menu + Hub -->
            <div id="topbar-left">
                <button id="nav-menu-btn" class="topbar-icon-btn" aria-label="Menu de Navegação" title="Menu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <button id="hub-menu-btn" class="topbar-icon-btn hub-btn-explicit" title="Ecossistema SGE">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span class="hub-label" style="font-size:13px;font-weight:600;letter-spacing:0.05em;">Ecossistema</span>
                </button>
            </div>

            <!-- SGE HUB Dropdown -->
            <div id="hub-dropdown-overlay" class="hub-dropdown-overlay hidden">
                <div class="hub-dropdown-panel" onclick="event.stopPropagation()">
                    <div class="hub-header">
                        <div class="hub-header-title">
                            <span class="brand">SGE Ecossistema</span>
                            <span class="sys">Grupo GPS</span>
                        </div>
                        <button id="hub-close-btn" class="hub-close-btn" aria-label="Fechar Hub">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="hub-body" id="hub-tree-body">
                        <!-- Dynamic Hub Tree via hub.js -->
                    </div>
                </div>
            </div>

            <!-- NAV MENU OVERLAY (slide-in panel, mesmo padrão Efetivo) -->
            <div id="nav-menu-overlay" class="nav-menu-overlay hidden">
                <div class="nav-menu-panel">

                    <!-- Logo na header do menu -->
                    <div class="nav-menu-header"
                        style="justify-content:flex-start;padding:20px 16px;position:relative;align-items:center;min-height:90px;">
                        <div class="sidebar-logo" id="logo-home"
                            style="display:flex;justify-content:flex-start;align-items:center;cursor:pointer;width:100%;"
                            title="Voltar ao início">
                            <svg width="100%" height="60" viewBox="30 45 550 130" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <style>
                                        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap');

                                        text {
                                            font-family: 'Open Sans', 'Roboto', 'Arial', sans-serif;
                                        }
                                    </style>
                                </defs>
                                <g text-anchor="start">
                                    <text x="50" y="110" font-size="42" font-weight="700" fill="#002D5C">Grupo
                                        GPS</text>
                                    <line x1="300" y1="55" x2="300" y2="155" stroke="#757575" stroke-width="1.5" />
                                    <g transform="translate(315, 0)">
                                        <text x="0" y="102" font-size="30" font-weight="600"
                                            fill="#1E6B8C">MECANIZADA</text>
                                        <text x="0" y="137" font-size="20" font-weight="400" fill="#757575">RELATÓRIO DE
                                            TURNO</text>
                                        <text x="235" y="158" font-size="12" font-weight="400" fill="#757575"
                                            text-anchor="end">By SGE</text>
                                    </g>
                                </g>
                            </svg>
                        </div>
                    </div>

                    <!-- Nav items -->
                    <div class="nav-menu-body" style="padding-top:8px;">

                        <!-- Seção: Turno Atual -->
                        <div class="accordion-section active" id="acc-turno">
                            <button class="accordion-trigger">
                                Turno Atual
                                <svg class="accordion-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M6 9l6 6 6-6" />
                                </svg>
                            </button>
                            <div class="accordion-content">
                                <button class="nav-menu-item active" data-view="novo">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                        stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                        <polyline points="14 2 14 8 20 8"></polyline>
                                        <line x1="16" y1="13" x2="8" y2="13"></line>
                                        <line x1="16" y1="17" x2="8" y2="17"></line>
                                        <polyline points="10 9 9 9 8 9"></polyline>
                                    </svg>
                                    Novo Relatório
                                </button>
                                <button class="nav-menu-item" data-view="historico">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                        stroke-linecap="round" stroke-linejoin="round">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <polyline points="12 6 12 12 16 14"></polyline>
                                    </svg>
                                    Histórico de Hoje
                                </button>
                            </div>
                        </div>

                        <!-- Seção: Gestão -->
                        <div class="accordion-section" id="acc-gestao">
                            <button class="accordion-trigger">
                                Gestão
                                <svg class="accordion-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M6 9l6 6 6-6" />
                                </svg>
                            </button>
                            <div class="accordion-content">
                                <button class="nav-menu-item" data-view="dashboard" id="nav-dashboard-btn"
                                    style="display:none;">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                        stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="3" y="3" width="7" height="7"></rect>
                                        <rect x="14" y="3" width="7" height="7"></rect>
                                        <rect x="14" y="14" width="7" height="7"></rect>
                                        <rect x="3" y="14" width="7" height="7"></rect>
                                    </svg>
                                    Dashboard Operacional
                                </button>
                            </div>
                        </div>

                    </div><!-- /nav-menu-body -->

                    <!-- Footer com user info (mesmo do Efetivo) -->
                    <div class="nav-menu-footer">
                        <div class="nav-menu-stats">
                            <div class="nav-menu-stat">Equip: <strong id="stat-equip-menu">—</strong></div>
                            <div class="nav-menu-stat">Turno: <strong id="stat-turno-menu">—</strong></div>
                        </div>
                        <div id="nav-menu-user" class="nav-menu-user-info">
                            <!-- Populado por auth.js -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT: Dark Mode + Export -->
            <div id="topbar-right">
                <!-- Dark Mode Toggle -->
                <button id="dark-mode-btn" class="topbar-icon-btn" title="Modo Noturno" aria-label="Alternar Modo Noturno">
                    <svg id="dark-mode-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                    <svg id="dark-mode-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                </button>

                <!-- Export -->
                <button id="topbar-export-btn" class="topbar-icon-btn" title="Exportar Dados" aria-label="Exportar Dados">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                </button>
            </div>
        </div><!-- /topbar -->

        <!-- ==================== RELATORIO TABS (padrão Gestão de Efetivo) ==================== -->
        <div id="relatorio-tabs" class="tabs"
            style="padding: 0 24px; padding-top: 16px; margin-bottom: 0; flex-shrink: 0;">
            <button class="dash-tab-btn active" data-view="novo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    style="width:14px;height:14px;" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="12" y1="18" x2="12" y2="12"></line>
                    <line x1="9" y1="15" x2="15" y2="15"></line>
                </svg>
                Novo Relatório
            </button>
            <button class="dash-tab-btn" data-view="historico">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    style="width:14px;height:14px;" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                Histórico
            </button>
            <button class="dash-tab-btn" data-view="dashboard" id="tab-dashboard" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    style="width:14px;height:14px;" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                </svg>
                Dashboard
            </button>
        </div>

        <!-- ==================== MAIN CONTENT ==================== -->
        <div id="main">

            <!-- NOVO RELATORIO VIEW -->
            <div id="novo-view" class="view active">
                <div class="rt-scroll-wrap">
                    <div class="rt-container" id="relatorio-content">
                        <!-- Populado por relatorio.js -->
                    </div>
                </div>
            </div>

            <!-- HISTÓRICO VIEW -->
            <div id="historico-view" class="view">
                <div class="rt-scroll-wrap">
                    <div class="rt-container">
                        <div class="page-header">
                            <div>
                                <div class="page-title">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                        stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px;">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <polyline points="12 6 12 12 16 14"></polyline>
                                    </svg>
                                    Histórico de Hoje
                                </div>
                                <div class="page-sub" id="historico-date-sub">Relatórios registrados em —</div>
                            </div>
                            <button id="historico-refresh-btn" class="topbar-icon-btn" title="Atualizar"
                                style="width:auto;padding:0 14px;gap:6px;font-size:12px;font-weight:600;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    style="width:14px;height:14px;">
                                    <polyline points="23 4 23 10 17 10"></polyline>
                                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                                </svg>
                                Atualizar
                            </button>
                        </div>
                        <div id="historico-content"></div>
                    </div>
                </div>
            </div>

            <!-- DASHBOARD VIEW -->
            <div id="dashboard-view" class="view">
                <div class="rt-scroll-wrap">
                    <div class="rt-container" id="dashboard-content"></div>
                </div>
            </div>

        </div><!-- /main -->

        <!-- ==================== MODAL ==================== -->
        <div id="modal-overlay">
            <div id="modal">
                <div class="modal-header">
                    <div class="modal-title">—</div>
                </div>
                <div class="modal-body"></div>
                <div class="modal-footer"></div>
            </div>
        </div>

        <!-- ==================== TOAST ==================== -->
        <div id="toast-container"></div>

    </div><!-- /app -->

    <!-- JS Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- DEV MODE: bypass SSO automático em ambiente local (file:// / localhost)
         SSO não consegue redirecionar de volta para file://, portanto o bypass
         é ativado automaticamente. Em produção (https) esta lógica é ignorada. -->
    <script>
      (function () {
        var isLocal = location.protocol === 'file:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
        if (isLocal) {
          window.SGE_SSO_BYPASS = true;
          console.log('[SGE DEV] Bypass SSO ativado automaticamente — protocolo local detectado (' + location.protocol + ')');
        }
      })();
    </script>

    <script src="https://grupogps-mecanizada.github.io/SGE_GRUPOGPS/js/auth/sso_client.js?v=6"></script>
    <!-- Ticket Widget: suporte SGE flutuante — abre chamados para o SGE Central -->
    <script src="https://grupogps-mecanizada.github.io/SGE-CENTRAL/js/sge-ticket-widget.js?v=1"></script>

    <!-- JS Modules -->
    <script src="js/config.js?v=1.1.0"></script>
    <script src="js/supabase-config.js?v=1.1.0"></script>
    <script src="js/state.js?v=1.1.0"></script>
    <script src="js/sge-session-ping.js?v=1.1.0"></script>
    <script src="js/helpers.js?v=1.1.0"></script>
    <script src="js/api.js?v=1.1.0"></script>
    <script src="js/auth.js?v=1.1.0"></script>
    <script src="js/navigation.js?v=1.1.0"></script>
    <script src="js/relatorio.js?v=1.1.0"></script>
    <script src="js/particles.js?v=1.1.0"></script>
    <script src="js/hub.js?v=1.1.0"></script>
    <script src="js/dark-mode.js?v=1.1.0"></script>
    <script src="js/app.js?v=1.1.0"></script>
    <script src="js/dev-mode.js?v=1.1.0"></script>
    <!-- Push Notifications: notifica novos relatórios quando a aba está em segundo plano -->
    <script src="js/notifications.js?v=1.1.0"></script>
    <!-- Auto-Update: detecta novas versões e atualiza todos os navegadores automaticamente -->
    <script src="js/updater.js?v=1.1.0"></script>


</body>

</html>
