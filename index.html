<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>SGE — Relatório de Turno</title>
    <meta name="theme-color" content="#0f3868" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <!-- CSS Modules -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/topbar.css" />
    <link rel="stylesheet" href="css/filterbar.css" />
    <link rel="stylesheet" href="css/history.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/drawer.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <link rel="stylesheet" href="css/toast.css" />
    <link rel="stylesheet" href="css/relatorio.css" />
</head>

<body>
    <!-- ==================== LOGIN SCREEN / REDIRECT ==================== -->
    <div id="login-screen" class="hidden"
        style="display: flex; align-items: center; justify-content: center; height: 100vh;">
        <div class="login-box" style="text-align: center; border: none; box-shadow: none; background: transparent;">
            <div style="margin-bottom: 20px;">
                <svg viewBox="0 0 24 24" width="48" height="48" stroke="var(--primary)" stroke-width="2" fill="none"
                    class="spin">
                    <circle cx="12" cy="12" r="10" stroke-opacity="0.25"></circle>
                    <path d="M12 2a10 10 0 0 1 10 10"></path>
                </svg>
            </div>
            <h2 style="color: var(--text-1); font-size: 18px; margin-bottom: 8px;">Acessando o SGE...</h2>
            <p style="color: var(--text-2); font-size: 14px;">Redirecionando para a autenticação centralizada.</p>
        </div>
    </div>

    <!-- ==================== MAIN APP ==================== -->
    <div id="app" style="display: none;">

        <!-- ==================== LOADING SCREEN ==================== -->
        <div id="loading-screen" style="background:var(--bg-0)">
            <div class="loading-content">
                <div class="loading-bar-container">
                    <div class="loading-bar"></div>
                </div>
                <div id="loading-status"
                    style="color:var(--text-3); font-size:12px; font-weight:500; margin-top:14px; text-align:center; letter-spacing:0.02em;">
                    Conectando...</div>
            </div>
        </div>

        <!-- ==================== SYNC BAR ==================== -->
        <div id="global-sync-bar"></div>

        <!-- ==================== TOPBAR ==================== -->
        <div id="topbar">
            <div class="logo">
                <span>GRUPO GPS</span>
                <span>Mecanizada</span>
                <div style="height:1px; background:var(--border); width:100%; margin:2px 0;"></div>
                <span>Relatório de Turno</span>
            </div>

            <!-- Hamburger Button (Mobile Only) -->
            <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Abrir Menu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>

            <div id="nav" class="nav-modules">
                <div class="nav-module active">
                    <button class="module-title" data-view="novo">
                        Novo Relatório
                    </button>
                </div>

                <div class="nav-module">
                    <button class="module-title" data-view="historico">
                        Histórico
                    </button>
                </div>

                <div class="nav-module" id="nav-dashboard" style="display:none;">
                    <button class="module-title" data-view="dashboard">
                        Dashboard
                    </button>
                </div>
            </div>

            <div id="topbar-right">
                <div id="topbar-user">
                </div>
            </div>
        </div>

        <!-- ==================== MAIN CONTENT ==================== -->
        <div id="main" style="top: 55px; height: calc(100vh - 55px); overflow-y: auto;">

            <!-- NOVO RELATORIO VIEW -->
            <div id="novo-view" class="view active">
                <div class="relatorio-container" id="relatorio-content">
                    <!-- Content built by relatorio.js -->
                </div>
            </div>

            <!-- HISTÓRICO VIEW -->
            <div id="historico-view" class="view">
                <div class="relatorio-container">
                    <h2 style="margin-bottom: 24px; color: var(--text-1); font-size: 24px;">Histórico (Hoje)</h2>
                    <div id="historico-content"></div>
                </div>
            </div>

            <!-- DASHBOARD VIEW -->
            <div id="dashboard-view" class="view">
                <div class="relatorio-container" id="dashboard-content"></div>
            </div>

        </div>

        <!-- ==================== TOAST ==================== -->
        <div id="toast-container"></div>
    </div>

    <!-- JS Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://grupogps-mecanizada.github.io/SGE_GRUPOGPS/js/auth/sso_client.js?v=5"></script>

    <!-- JS Modules -->
    <script src="js/config.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/relatorio.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
