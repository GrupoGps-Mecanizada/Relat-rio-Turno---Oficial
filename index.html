    <!-- DEV MODE: bypass SSO automático em ambiente local (file:// / localhost)
         SSO não consegue redirecionar de volta para file://, portanto o bypass
         é ativado automaticamente. Em produção (https) esta lógica é ignorada. -->
    <script>
      (function () {
        var isLocal = location.protocol === 'file:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
        if (isLocal) {
          window.SGE_SSO_BYPASS = true;
          console.log('[SGE DEV] Bypass SSO ativado automaticamente — protocolo local detectado (' + location.protocol + ')');
        }
      })();
    </script>

    <!-- Hub & Nav behavior (inline, mesma lógica do Efetivo) -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ── Hub overlay ──────────────────────────────────────────────────────
            const hubBtn = document.getElementById('hub-menu-btn');
            const hubOverlay = document.getElementById('hub-dropdown-overlay');
            const hubClose = document.getElementById('hub-close-btn');

            if (hubBtn && hubOverlay) {
                hubBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    hubOverlay.classList.toggle('hidden');
                    hubOverlay.classList.toggle('show');
                });
            }
            if (hubClose && hubOverlay) {
                hubClose.addEventListener('click', () => {
                    hubOverlay.classList.add('hidden');
                    hubOverlay.classList.remove('show');
                });
            }
            if (hubOverlay) {
                hubOverlay.addEventListener('click', (e) => {
                    if (e.target === hubOverlay) {
                        hubOverlay.classList.add('hidden');
                        hubOverlay.classList.remove('show');
                    }
                });
            }

            // ── Nav menu ─────────────────────────────────────────────────────────
            const navBtn = document.getElementById('nav-menu-btn');
            const navOverlay = document.getElementById('nav-menu-overlay');

            if (navBtn && navOverlay) {
                navBtn.addEventListener('click', () => {
                    navOverlay.classList.toggle('hidden');
                });
                navOverlay.addEventListener('click', (e) => {
                    if (e.target === navOverlay) navOverlay.classList.add('hidden');
                });
            }

            // ── Accordion sections ────────────────────────────────────────────────
            document.querySelectorAll('.accordion-trigger').forEach(trigger => {
                trigger.addEventListener('click', () => {
                    const section = trigger.closest('.accordion-section');
                    const isActive = section.classList.contains('active');
                    section.classList.toggle('active', !isActive);
                    const content = section.querySelector('.accordion-content');
                    if (content) {
                        content.style.maxHeight = !isActive ? content.scrollHeight + 'px' : '0';
                    }
                });
                // Set initial max-height for active sections
                const section = trigger.closest('.accordion-section');
                const content = section.querySelector('.accordion-content');
                if (content && section.classList.contains('active')) {
                    content.style.maxHeight = content.scrollHeight + 'px';
                    content.style.opacity = '1';
                }
            });

            // ── Logo home click ───────────────────────────────────────────────────
            const logoHome = document.getElementById('logo-home');
            if (logoHome) {
                logoHome.addEventListener('click', () => {
                    document.querySelector('[data-view="novo"]')?.click();
                    navOverlay?.classList.add('hidden');
                });
            }

            // ── Tab navigation (tabs + nav items) ────────────────────────────────
            const allNavItems = document.querySelectorAll('[data-view]');
            const views = { novo: 'novo-view', historico: 'historico-view', dashboard: 'dashboard-view' };
            const tabBtns = document.querySelectorAll('#relatorio-tabs .dash-tab-btn');
            const navMenuItems = document.querySelectorAll('.nav-menu-item[data-view]');

            function navigateTo(viewKey) {
                // Hide all views
                Object.values(views).forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.classList.remove('active');
                });
                // Show target
                const target = document.getElementById(views[viewKey]);
                if (target) target.classList.add('active');

                // Update tab active state
                tabBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.view === viewKey);
                });
                navMenuItems.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.view === viewKey);
                });

                // Close nav menu
                if (navOverlay) navOverlay.classList.add('hidden');

                // Trigger view logic
                if (window.SGE_RT && SGE_RT.relatorio) {
                    if (viewKey === 'novo') SGE_RT.relatorio.renderNovoRelatorio();
                    else if (viewKey === 'historico') SGE_RT.relatorio.renderHistorico();
                    else if (viewKey === 'dashboard') SGE_RT.relatorio.renderDashboard();
                }
            }

            allNavItems.forEach(btn => {
                btn.addEventListener('click', () => navigateTo(btn.dataset.view));
            });

            // ── Historico refresh ─────────────────────────────────────────────────
            const refreshBtn = document.getElementById('historico-refresh-btn');
            if (refreshBtn) {
                refreshBtn.addEventListener('click', () => {
                    if (window.SGE_RT && SGE_RT.relatorio) SGE_RT.relatorio.renderHistorico();
                });
            }
        });
    </script>
